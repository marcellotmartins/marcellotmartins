name: Update commit count

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:           # allows manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update total commits badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -e

          query='query($login:String!,$from:DateTime!,$to:DateTime!){ user(login:$login){ contributionsCollection(from:$from,to:$to){ totalCommitContributions restrictedContributionsCount } } }'

          start_year=$(gh api users/"$OWNER" --jq '.created_at' | cut -c1-4)
          end_year=$(date -u +%Y)

          total=0
          for y in $(seq "$start_year" "$end_year"); do
            c=$(gh api graphql -f query="$query" \
                  -f login="$OWNER" \
                  -f from="${y}-01-01T00:00:00Z" \
                  -f to="${y}-12-31T23:59:59Z" \
                  --jq '.data.user.contributionsCollection.totalCommitContributions + .data.user.contributionsCollection.restrictedContributionsCount')
            total=$((total + c))
          done
          echo "Total commit contributions: $total"

          # safety guard: never overwrite the badge with a clearly bogus low number
          if [ "$total" -lt 100 ]; then
            echo "Count looks wrong ($total) — skipping update."
            exit 0
          fi

          # insert thousands separators: 4738 -> 4,738
          formatted=$(echo "$total" | sed ':a;s/\B[0-9]\{3\}\>/,&/;ta')
          encoded=${formatted//,/%2C}

          sed -i -E "s|Total%20commits-[^-]*-2e7d32|Total%20commits-${encoded}-2e7d32|" README.md

          if git diff --quiet; then
            echo "No change needed."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update total commit count to ${formatted}"
            git push
          fi
